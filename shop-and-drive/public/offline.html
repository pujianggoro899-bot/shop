<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop & Drive - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f9fafb; color: #111827;
    }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .icon { font-size: 5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6b7280; margin-bottom: 1.5rem; line-height: 1.6; }
    .btn {
      display: inline-block; background: #dc2626; color: white;
      padding: 0.75rem 1.5rem; border-radius: 0.5rem;
      text-decoration: none; font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #b91c1c; }
    .info { margin-top: 1.5rem; padding: 1rem; background: #fef3c7; border-radius: 0.5rem; font-size: 0.875rem; color: #92400e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Koneksi Terputus</h1>
    <p>Anda sedang offline. Beberapa fitur mungkin tidak tersedia. Silakan periksa koneksi internet Anda.</p>
    <a href="/" class="btn" onclick="location.reload()">Coba Lagi</a>
    <div class="info">
      💡 Tip: Anda bisa menambahkan Shop & Drive ke layar utama untuk pengalaman yang lebih baik.
    </div>
  </div>
</body>
</html>
